<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>AHRP POS Engine v2</title>
    </head>
<body>

    <div id="print-area"></div>

    <div class="app-container">
        
        <div id="pos-tab" class="tab-content active">
            <div class="pos-layout-grid">
                
                <div class="menu-selection-workspace">
                    <div id="category-filter-container" class="filter-bar"></div>
                    <div id="items-grid" class="cards-grid"></div>
                </div>

                <div class="checkout-sidebar-workspace">
                    <div class="sidebar-card">
                        <div class="card-header-label">Queue Array Buffer</div>
                        <div id="cart-container" class="dynamic-cart-list"></div>
                        
                        <div class="checkout-actions-row" style="margin-top: 16px; display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
                            <button class="btn-primary-action" onclick="printTokens()" style="background: var(--accent); padding: 12px; font-weight: 700;">
                                Issue Token
                            </button>
                            <button class="btn-refund-action" onclick="initiateCounterRefund()" style="background: var(--danger); color: white; border: none; padding: 12px; font-weight: 700; border-radius: 6px; cursor: pointer;">
                                Reverse Token
                            </button>
                        </div>
                    </div>

                    <div class="sidebar-card" style="margin-top: 16px;">
                        <div class="card-header-label">Shift Metrics Matrix</div>
                        <div id="live-total-container"></div>
                    </div>
                </div>

            </div>
        </div>

        <div id="logs-tab" class="tab-content">
            <div class="section-title">Active Shift Live Stream Records</div>
            <table class="styled-table">
                <thead>
                    <tr>
                        <th style="width: 100px;">Time Node</th>
                        <th style="width: 110px;">Token ID</th>
                        <th>Profile / Item Breakdown Matrix</th>
                        <th style="text-align: center; width: 120px;">Allocation Vol</th>
                    </tr>
                </thead>
                <tbody id="live-log"></tbody>
            </table>

            <div class="section-title" style="margin-top: 32px; color: var(--danger);">Voided Log History Archive</div>
            <table class="styled-table" style="border-top: 2px solid var(--danger);">
                <thead>
                    <tr>
                        <th style="width: 100px;">Time Node</th>
                        <th style="width: 110px;">Token ID</th>
                        <th>Profile / Item Breakdown Matrix</th>
                        <th style="text-align: center; width: 120px;">Voided Volume</th>
                    </tr>
                </thead>
                <tbody id="refund-log"></tbody>
            </table>
        </div>

    </div>

    <div id="secure-pin-modal" class="modal-overlay-backdrop" style="display:none; position: fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.6); align-items:center; justify-content:center; z-index:9999;">
        <div class="modal-surface-box" style="background:white; padding:24px; border-radius:8px; width:340px; box-shadow:0 12px 32px rgba(0,0,0,0.25);">
            <div id="modal-title-text" style="font-weight:700; margin-bottom:14px; color:#1e293b;">Validation Pin Required</div>
            <input type="password" id="modal-pin-input" class="input-field" placeholder="••••" style="width:100%; font-size:24px; text-align:center; padding:8px; letter-spacing:6px; margin-bottom:16px;">
            <div style="display:flex; justify-content:flex-end; gap:8px;">
                <button class="btn-action-small" onclick="closePinModal()" style="background:#e2e8f0; color:#475569;">Cancel</button>
                <button class="btn-action-small" onclick="submitPinModal()" style="background:var(--primary); color:white;">Submit</button>
            </div>
        </div>
    </div>

    <div id="customer-name-modal" class="modal-overlay-backdrop" style="display:none; position: fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.6); align-items:center; justify-content:center; z-index:9999;">
        <div class="modal-surface-box" style="background:white; padding:24px; border-radius:8px; width:360px;">
            <div style="font-weight:700; margin-bottom:12px; color:#1e293b;">Assign Profile Registry Identity</div>
            <input type="text" id="cust-modal-name-input" class="input-field" list="customer-memory-list" placeholder="Enter name or scan code..." style="width:100%; padding:10px; margin-bottom:16px;">
            <datalist id="customer-memory-list"></datalist>
            <div style="display:flex; justify-content:flex-end; gap:8px;">
                <button class="btn-action-small" onclick="closeCustomerModal()" style="background:#e2e8f0; color:#475569;">Skip</button>
                <button class="btn-action-small" onclick="submitCustomerModal()" style="background:var(--accent); color:white;">Proceed</button>
            </div>
        </div>
    </div>

</body>
